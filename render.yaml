services:
  # Next.js Frontend
  - type: web
    name: family-stay-mini-app
    env: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_VERSION
        value: 20
  
  # Telegram Bot Backend
  - type: worker
    name: family-stay-bot
    env: node
    buildCommand: cd bot && npm install
    startCommand: cd bot && node index.js
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEB_APP_URL
        sync: false
      - key: NODE_VERSION
        value: 20
